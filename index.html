<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>

<style>

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background-image:url(cd.png);
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    margin:0;
}

.Cadastro{
    background-color:rgba(255,255,255,0.699);
    padding:20px;
    width:230px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    border:2px solid rgba(255,255,255,0.541);
    box-shadow:
    0 0 15px rgb(255,255,255),
    0 0 30px rgba(255,255,255,0.5);
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

button{
    display:block;
    margin:10px auto;
    background-color:rgb(93,0,155);
    color:white;
    border:none;
    border-radius:10px;
    padding:10px 15px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:white;
    color:black;
}

input{
    width:200px;
    padding:10px;
    border:none;
    border-radius:10px;
    margin-top:5px;
}

h2{
    text-align:center;
}

</style>
</head>
<body>

<div class="Cadastro">

    <h2>Tela de Cadastro</h2>

    <p>
        <label>Nome</label>
        <input type="text" id="name" placeholder="Username">
    </p>

    <p>
        <label>Email</label>
        <input type="email" id="email" placeholder="Email">
    </p>

    <p>
        <label>Senha</label>
        <input type="password" id="senha" placeholder="Senha">
    </p>

    <button onclick="cadastrar()">
        Cadastrar
    </button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  setDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyA50GT5IBtfdlVTDF3KurYv6QfcC6I_Xjw",

  authDomain: "blocodenotas-c81fc.firebaseapp.com",

  projectId: "blocodenotas-c81fc",

  storageBucket: "blocodenotas-c81fc.firebasestorage.app",

  messagingSenderId: "521683003523",

  appId: "1:521683003523:web:dc216cf12e842a8f9b53b6"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* CADASTRO */

window.cadastrar = async function(){

    let nome = document.getElementById("name").value;

    let email = document.getElementById("email").value;

    let senha = document.getElementById("senha").value;

    if(nome === "" || email === "" || senha === ""){

        alert("Preencha todos os campos!");

        return;

    }

    try{

        const userCredential =
        await createUserWithEmailAndPassword(
            auth,
            email,
            senha
        );

        const user = userCredential.user;

        /* NOME */

        await updateProfile(user, {

            displayName:nome

        });

        /* SALVAR DADOS */

        await setDoc(
            doc(db, "usuarios", user.uid),
            {

                nome:nome,
                email:email,
                criadoEm:new Date()

            }
        );

        alert("Cadastro realizado com sucesso!");

        window.location.href =
        "https://manu140510.github.io/bnlogin/";

    }catch(error){

        alert("Erro: " + error.message);

    }

}

</script>

</body>
</html>
