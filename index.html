<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>

    <style>

      body{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-image: url(img.png);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .login{
        background-color: rgba(93, 0, 155, 0.699);
        padding: 20px;
        width: 200px;
        border-radius: 15px;
        backdrop-filter: blur(10px);

        border: 2px solid rgba(255, 255, 255, 0.541);

        box-shadow:
         0 0 15px rgb(255, 255, 255),
         0 0 30px rgba(255, 255, 255, 0.5);

        color: white;
        
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
      }

      .inputdois{
        border-radius: 10px;
        padding: 4px;
        padding-left: 35px;
        background-image: url(email.png);
        background-repeat: no-repeat;
        background-size: 20px;
        background-position: 10px center;
      }

      .inputtres{
        border-radius: 10px;
        padding: 4px;
        padding-left: 35px;
        background-image: url(password.png);
        background-repeat: no-repeat;
        background-size: 20px;
        background-position: 10px center;
      }

      ::placeholder{
        color: black;
      }

      button{
        border-radius: 10px;
        padding: 5px;
        cursor: pointer;
      }

      a{
        color: white;
      }

      a:active{
        color: rgb(0, 0, 0);
      }

    </style>

</head>
<body>
    
      <div class="login"> 
          
        <h2>Tela de Login</h2>

        <p>
        <label for="login">Login</label><br>
          <input class="inputdois" type="email" id="login" placeholder="Digite seu email">
        </p>

        <p>
        <label for="senha">Senha</label><br>
          <input class="inputtres" type="password" id="senha" placeholder="Digite sua senha">
        </p>

        <p>
          <label>
            <input type="checkbox">
            Lembrar da senha
          </label>
        </p>

        <p>
          <button type="button" onclick="entrar()">
            Entrar
          </button>
        </p>

        <a href="https://manu140510.github.io/bccadastro/">
          Cadastrar
        </a>

      </div> 

<script>

/* LOGIN */

function entrar(){

    let email = document.getElementById("login").value;
    let senha = document.getElementById("senha").value;

    /* PEGAR DADOS SALVOS */

    let emailSalvo = localStorage.getItem("email");
    let senhaSalva = localStorage.getItem("senha");

    /* VERIFICAR */

    if(email === emailSalvo && senha === senhaSalva){

        alert("Login realizado com sucesso!");

        /* REDIRECIONAR */

        window.location.href = "https://manu140510.github.io/bnconta/";

    } else {

        alert("Email ou senha incorretos!");

    }

}

</script>

</body>
</html>
